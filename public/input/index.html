<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>boim.thinks</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #090f14; color: #334155; margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
      .form-container { background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); width: 100%; max-width: 500px; box-sizing: border-box; }
      h2 { margin-top: 0; color: #1e293b; font-size: 22px; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 20px; }
      .form-group { margin-bottom: 20px; }
      label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; }
      textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; resize: vertical; font-family: inherit; font-size: 14px; }
      input[type="file"] { display: block; width: 100%; padding: 10px; border: 1px dashed #cbd5e1; background-color: #f8fafc; border-radius: 6px; box-sizing: border-box; cursor: pointer; }
      button { width: 100%; background-color: #2563eb; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; }
      button:disabled { background-color: #94a3b8; cursor: not-allowed; }
      #status-message { margin-top: 15px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; text-align: center; font-weight: 500; }
      .success { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
      .loading { background-color: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
      .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
  </head>
  <body>

      <div class="form-container">
      
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span style="font-size: 30px; font-weight: bold;">boim.thinks</span>
          <div style="display: flex; align-items: center; gap: 10px;">
            <span id="statusIndicator" style="width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; background-color: #94a3b8;" title="Jumlah field di frontmatter"></span>
            <span id="deployButton" style="cursor: pointer; font-size: 1.5rem;" title="Deploy Website">🚀</span>
          </div>
        </div>
      
      
      <form id="mainForm">
        <div class="form-group">
          <label for="konsepKasar">Konsep Kasar</label>
          <textarea id="konsepKasar" placeholder="Masukkan konsep kasar di sini..." required></textarea>
        </div>
        
        <div class="form-group">
          <label for="myFile">Feature Image</label>
          <input type="file" id="myFile" required>
        </div>
        
        <button type="submit" id="submitBtn">Simpan</button>
      </form>
      
      <div id="status-message"></div>

    </div>

    <!-- Iframe tersembunyi untuk memproses submit tanpa reload halaman & bypass CORS -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;">

    </iframe>
    <script>
      const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFLCINv1Wg5Aes-xj7Kp1QJ2fPpCKEa61DXA4zMg3BE4Aq3xVkC48Fxh4xNmtHUTMV/exec";
      const NETLIFY_HOOK_URL = "https://api.netlify.com/build_hooks/6a0f07ff10ebc16d680132b0";
      const STATUS_API_URL = "https://script.google.com/macros/s/AKfycbyFLCINv1Wg5Aes-xj7Kp1QJ2fPpCKEa61DXA4zMg3BE4Aq3xVkC48Fxh4xNmtHUTMV/exec";

      // Function to check Google Sheet status using fetch
      async function checkSheetStatus() {
        const statusIndicator = document.getElementById('statusIndicator');
        statusIndicator.style.backgroundColor = '#94a3b8';

        try {
          const response = await fetch(STATUS_API_URL, { redirect: 'follow' });
          if (!response.ok) throw new Error('HTTP ' + response.status);

          const text = await response.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch {
            // Some GAS deployments return wrapped in HTML/textarea
            const match = text.match(/(\{.*\}|\[.*\])/s);
            if (match) {
              data = JSON.parse(match[0]);
            } else {
              throw new Error('Could not parse response as JSON');
            }
          }

          if (data) {
            processSheetData(data, statusIndicator);
          }
        } catch (error) {
          console.error('Fetch request failed:', error);
          statusIndicator.style.backgroundColor = '#94a3b8';
        }
      }
      
      // Simple frontmatter parser (no external deps)
      function parseFrontmatter(content) {
        const result = {};
        try {
          const match = content.match(/^---\s*\n([\s\S]*?)\n(?:---|\.\.\.)/);
          if (match) {
            match[1].split('\n').forEach(line => {
              const idx = line.indexOf(':');
              if (idx > 0) {
                const key = line.slice(0, idx).trim();
                let val = line.slice(idx + 1).trim();
                val = val.replace(/^["']|["']$/g, '');
                if (val) result[key] = val;
              }
            });
          }
        } catch (e) { /* ignore parse errors */ }
        return result;
      }

      // Function to process the sheet data and update indicator
      function processSheetData(data, statusIndicator) {
        let postsData = [];
        
        if (data.posts && Array.isArray(data.posts)) {
          postsData = data.posts;
        } else if (data.data && Array.isArray(data.data)) {
          postsData = data.data;
        } else if (Array.isArray(data)) {
          postsData = data;
        } else {
          const dataArrayKey = Object.keys(data).find(key => Array.isArray(data[key]));
          if (dataArrayKey) { postsData = data[dataArrayKey]; } else { return; }
        }
        
        if (!postsData || postsData.length === 0) return;

        let publishedCount = 0;
        for (const entry of postsData) {
          const fm = entry.content ? parseFrontmatter(entry.content) : {};
          if (fm.status === 'published') publishedCount++;
        }
        
        statusIndicator.textContent = publishedCount;
        statusIndicator.style.backgroundColor = '#4ade80';
      }

      // Initial check
      checkSheetStatus();

      // Periodically check status every 20 seconds
      setInterval(checkSheetStatus, 20000);

      // Function to convert image to WebP and resize to 900px width
      function processImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
              // Create canvas for resizing
              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');
              
              // Calculate new dimensions (max width 900px)
              const maxWidth = 900;
              const scaleFactor = maxWidth / img.width;
              const newWidth = maxWidth;
              const newHeight = img.height * scaleFactor;
              
              // Set canvas dimensions
              canvas.width = newWidth;
              canvas.height = newHeight;
              
              // Draw resized image on canvas
              ctx.drawImage(img, 0, 0, newWidth, newHeight);
              
              // Convert to WebP with quality 80%
              const webpDataUrl = canvas.toDataURL('image/webp', 0.8);
              
              resolve({
                dataUrl: webpDataUrl,
                newName: file.name.replace(/\.[^/.]+$/, ".webp") // Change extension to .webp
              });
            };
            img.onerror = reject;
            img.src = e.target.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      document.getElementById('mainForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('status-message');
        const konsepKasarVal = document.getElementById('konsepKasar').value;
        const fileInput = document.getElementById('myFile').files[0];
        
        if (!fileInput) return;

        submitBtn.disabled = true;
        statusMsg.style.display = 'block';
        statusMsg.className = 'loading';
        statusMsg.innerHTML = 'Memproses gambar dan mengirim data...';

        try {
          // Process image (convert to WebP and resize)
          const processedImage = await processImage(fileInput);
          
          const payload = {
            konsepKasar: konsepKasarVal,
            fileName: processedImage.newName,
            fileData: processedImage.dataUrl
          };

          // Membuat form virtual yang melempar target data ke iframe tersembunyi
          const vForm = document.createElement('form');
          vForm.method = 'POST';
          vForm.action = APPS_SCRIPT_URL;
          vForm.target = 'hidden_iframe';

          const vInput = document.createElement('input');
          vInput.type = 'hidden';
          vInput.name = 'json_payload'; // Dibungkus agar aman
          vInput.value = JSON.stringify(payload);
          
          vForm.appendChild(vInput);
          document.body.appendChild(vForm);
          
          // Deteksi ketika iframe selesai memproses data
          document.getElementById('hidden_iframe').onload = function() {
            submitBtn.disabled = false;
            statusMsg.className = 'success';
            statusMsg.innerHTML = 'Data sukses terkirim ke Google Sheets!';
            document.getElementById('mainForm').reset();
            vForm.remove();
          };

          vForm.submit();
        } catch (error) {
          console.error('Error processing image:', error);
          submitBtn.disabled = false;
          statusMsg.className = 'error';
          statusMsg.innerHTML = 'Gagal memproses gambar. Silakan coba lagi.';
          statusMsg.style.display = 'block';
        }
      });

      // Add event listener for deploy button
      document.getElementById('deployButton').addEventListener('click', async function() {
        const statusMsg = document.getElementById('status-message');
        
        statusMsg.style.display = 'block';
        statusMsg.className = 'loading';
        statusMsg.innerHTML = 'Mengirimkan sinyal deploy ke Netlify...';
        
        try {
          const response = await fetch(NETLIFY_HOOK_URL, {
            method: 'POST'
          });
          
          if (response.ok) {
            statusMsg.className = 'success';
            statusMsg.innerHTML = '✅ BERHASIL! Netlify sedang melakukan build ulang. Tunggu sekitar 1-2 menit.';
          } else {
            throw new Error("Respon server tidak oke");
          }
        } catch (error) {
          statusMsg.className = 'error';
          statusMsg.innerHTML = '❌ GAGAL: Terjadi masalah koneksi atau URL Hook salah.';
        }
      });
    </script>
  </body>
</html>
